<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub</title>
  <!-- jQuery (course requirement) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Custom font (CSS3 @font-face requirement) -->
  <style>
    @font-face {
      font-family: 'Rubik';
      src: url('https://fonts.gstatic.com/s/rubik/v28/iJWKBXyIfDnIV7nBrXyw023e.woff2') format('woff2');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Rubik';
      src: url('https://fonts.gstatic.com/s/rubik/v28/iJWKBXyIfDnIV7nBrXyw023e.woff2') format('woff2');
      font-weight: 700;
    }
  </style>
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Prevent theme flash: apply saved theme or OS preference before React renders -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
